<!DOCTYPE html>
<html>
<body>
  <input type="number" id="a">
  <input type="number" id="b">
  <button onclick="calc('+')">+</button>
  <button onclick="calc('-')">-</button>
  <p id="out"></p>

  <script>
    function calc(op) {
      let a = +document.getElementById('a').value;
      let b = +document.getElementById('b').value;
      let res = op === '+' ? a + b : a - b;
      document.getElementById('out').textContent = 'Nəticə: ' + res;
    }
  </script>
</body>
</html>
